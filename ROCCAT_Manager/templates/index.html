<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROCCAT Manager — Kone XP Air</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0f0f12;
    --bg2:        #18181f;
    --bg3:        #21212b;
    --bg4:        #2a2a36;
    --border:     #2e2e3d;
    --border2:    #3d3d52;
    --text:       #e8e8f0;
    --text2:      #9898b0;
    --text3:      #5a5a72;
    --accent:     #7c6af5;
    --accent-dim: #3a3460;
    --accent-txt: #c4bbff;
    --green:      #1d9e75;
    --green-dim:  #0d4033;
    --green-txt:  #5dd4a8;
    --red:        #e24b4a;
    --red-dim:    #3d1515;
    --red-txt:    #f09595;
    --amber:      #ef9f27;
    --amber-dim:  #3d2808;
    --amber-txt:  #fac775;
    --radius:     8px;
    --radius-lg:  12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Layout ── */
  .shell { display: flex; height: 100vh; overflow: hidden; }

  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar-logo {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo .logo-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .sidebar-logo .logo-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  .boot-switcher {
    display: flex;
    gap: 4px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .boot-btn {
    flex: 1;
    padding: 5px 6px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.12s;
  }
  .boot-btn:hover { border-color: var(--border2); color: var(--text); }
  .boot-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent-txt);
  }

  .sidebar-section {
    padding: 10px 12px 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text3);
    text-transform: uppercase;
  }
  .profile-nav { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
  .profile-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.1s;
    margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .profile-item:hover { background: var(--bg3); }
  .profile-item.active {
    background: var(--bg3);
    border-color: var(--border);
  }
  .profile-item.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .profile-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .profile-slot-num {
    font-size: 10px;
    color: var(--text3);
    width: 14px;
    flex-shrink: 0;
  }
  .profile-item-name {
    flex: 1;
    font-size: 13px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .profile-item.active .profile-item-name { color: var(--text); }

  .sidebar-footer {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }
  .export-all-btn {
    width: 100%;
    padding: 8px;
    border-radius: var(--radius);
    border: 1px solid var(--accent);
    background: var(--accent-dim);
    color: var(--accent-txt);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.12s;
  }
  .export-all-btn:hover { opacity: 0.8; }

  /* ── Content ── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── Active Slots Row ── */
  .slots-section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .active-slots-row {
    display: flex;
    gap: 10px;
  }
  .slot-card {
    flex: 1;
    background: var(--bg2);
    border: 2px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.12s;
    position: relative;
    min-width: 0;
  }
  .slot-card:hover { border-color: var(--border2); }
  .slot-card.active { border-color: var(--accent); background: var(--bg3); }
  .slot-card.drag-over { border-color: var(--accent); border-style: dashed; background: var(--accent-dim); }
  .slot-card.empty { opacity: 0.5; }
  .slot-card.empty.drag-over { opacity: 1; }
  .slot-num {
    font-size: 10px;
    color: var(--text3);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .slot-profile-row {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .slot-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .slot-profile-name {
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .slot-clear-btn {
    position: absolute;
    top: 5px; right: 5px;
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text3);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.12s;
    line-height: 1;
  }
  .slot-card:hover .slot-clear-btn { opacity: 1; }
  .slot-clear-btn:hover { border-color: var(--red); color: var(--red-txt); background: var(--red-dim); }

  /* ── Stored Profiles List ── */
  .stored-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stored-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.1s;
    border: 1px solid transparent;
  }
  .stored-item:hover { background: var(--bg3); }
  .stored-item.active { background: var(--bg3); border-color: var(--accent); }
  .stored-item[draggable="true"] { cursor: grab; }
  .stored-item[draggable="true"]:active { cursor: grabbing; }

  .profile-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .stored-item-name {
    flex: 1;
    font-size: 13px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .stored-item.active .stored-item-name { color: var(--text); }

  .stored-actions {
    display: flex;
    gap: 3px;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .stored-item:hover .stored-actions { opacity: 1; }

  .stored-action-btn {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text3);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
  }
  .stored-action-btn:hover { border-color: var(--accent); color: var(--accent-txt); }
  .stored-action-btn.delete:hover { border-color: var(--red); color: var(--red-txt); background: var(--red-dim); }

  .new-profile-btn {
    padding: 8px 14px;
    border-radius: var(--radius);
    border: 1px dashed var(--border2);
    background: transparent;
    color: var(--text3);
    font-size: 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.12s;
    margin-top: 4px;
  }
  .new-profile-btn:hover { border-color: var(--accent); color: var(--accent-txt); background: var(--accent-dim); }

  /* ── Profile Editor ── */
  .editor-section { display: flex; flex-direction: column; gap: 20px; }

  .topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
  }
  .topbar-name {
    flex: 1;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 3px 7px;
    transition: border-color 0.12s;
    background: transparent;
    outline: none;
  }
  .topbar-name:hover { border-color: var(--border2); }
  .topbar-name:focus { border-color: var(--accent); background: var(--bg3); }

  .color-swatch {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    flex-shrink: 0;
  }

  /* ── Cards ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 18px;
    border-bottom: 1px solid var(--border);
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    flex: 1;
  }
  .card-body { padding: 18px; }

  /* ── DPI Section ── */
  .dpi-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .dpi-label {
    font-size: 13px;
    color: var(--text2);
    font-weight: 500;
  }
  .dpi-input {
    width: 120px;
    padding: 8px 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    outline: none;
    transition: border-color 0.12s;
  }
  .dpi-input:focus { border-color: var(--accent); }

  /* ── Keybinds ── */
  .keybind-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .keybind-table thead th {
    padding: 6px 4px 10px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-align: left;
  }
  .keybind-table thead th:nth-child(3),
  .keybind-table thead th:nth-child(4) { text-align: left; }
  .keybind-table tr { border-bottom: 1px solid var(--border); }
  .keybind-table tr:last-child { border-bottom: none; }
  .keybind-table td { padding: 6px 4px; vertical-align: middle; }
  .keybind-table td:first-child { width: 30px; text-align: center; }
  .keybind-table td:nth-child(2) { font-size: 12px; color: var(--text2); width: 110px; }

  .btn-icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-icon svg { width: 14px; height: 14px; color: var(--text3); }

  .keybind-select {
    width: 100%;
    padding: 6px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 12px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.12s;
    -webkit-appearance: auto;
    appearance: auto;
  }
  .keybind-select:focus { border-color: var(--accent); }
  .keybind-select option { background: var(--bg3); }

  /* ── Hotkey assignment ── */
  .keybind-cell {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .hotkey-display {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    color: var(--accent-txt);
    font-size: 12px;
    font-weight: 600;
  }
  .hotkey-display .hotkey-clear {
    margin-left: auto;
    cursor: pointer;
    color: var(--text3);
    font-size: 14px;
    line-height: 1;
  }
  .hotkey-display .hotkey-clear:hover { color: var(--red-txt); }
  .rec-btn {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text3);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.12s;
  }
  .rec-btn:hover { border-color: var(--accent); color: var(--accent-txt); }
  .recording {
    flex: 1;
    padding: 5px 10px;
    background: var(--accent-dim);
    border: 2px solid var(--accent);
    border-radius: var(--radius);
    color: var(--accent-txt);
    font-size: 12px;
    text-align: center;
    animation: pulse-border 1s ease-in-out infinite;
  }
  @keyframes pulse-border {
    0%, 100% { border-color: var(--accent); }
    50% { border-color: var(--accent-txt); }
  }

  /* ── Mouse diagram ── */
  .mouse-diagram {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 4px 0;
  }
  .mouse-img-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .mouse-img-wrap img {
    display: block;
    height: 260px;
    width: auto;
  }
  .mouse-img-wrap .num {
    position: absolute;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: rgba(124, 106, 245, 0.85);
    border: 1.5px solid var(--accent-txt);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    transform: translate(-50%, -50%);
    z-index: 2;
    pointer-events: none;
  }
  .diagram-num {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 600;
    color: var(--accent-txt);
    flex-shrink: 0;
  }
  .diagram-label {
    font-size: 9px;
    color: var(--text3);
    text-align: center;
    margin-top: 4px;
  }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--bg4);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 13px;
    padding: 9px 18px;
    border-radius: var(--radius);
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s;
    white-space: nowrap;
    z-index: 9999;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  #toast.success { border-color: var(--green); color: var(--green-txt); }
  #toast.error   { border-color: var(--red);   color: var(--red-txt);   }

  /* ── Status bar ── */
  .statusbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 7px 24px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    font-size: 11px;
    color: var(--text3);
    flex-shrink: 0;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
  }
  .status-dot.warn { background: var(--amber); }
</style>
</head>
<body>

<div class="shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-title">ROCCAT Manager</div>
      <div class="logo-sub">Kone XP Air</div>
    </div>

    <div class="boot-switcher">
      <button class="boot-btn active" id="tab-boot1" onclick="switchBoot('boot1')">Gaming</button>
      <button class="boot-btn"        id="tab-boot2" onclick="switchBoot('boot2')">Work</button>
    </div>

    <div class="sidebar-section">Active Slots</div>
    <div id="active-slots-sidebar" style="padding:0 8px 4px;"></div>

    <div class="sidebar-section" style="border-top:1px solid var(--border);padding-top:10px;">Stored Profiles</div>
    <div class="profile-nav" id="stored-list-sidebar"></div>

    <div class="sidebar-footer">
      <button class="export-all-btn" onclick="importToMouse()" style="background:var(--green-dim);border-color:var(--green);color:var(--green-txt);">Import to Mouse</button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">

    <!-- Content -->
    <div class="content">

      <!-- Profile Editor (hidden until a stored profile is selected) -->
      <div id="editor-section" class="editor-section" style="display:none;">

        <!-- Editor Topbar — name + DPI + actions in one row -->
        <div class="topbar">
          <div class="color-swatch" id="color-swatch" title="Profile color"></div>
          <input class="topbar-name" id="profile-name-input" type="text" value="" onblur="saveProfileName()" onkeydown="if(event.key==='Enter')this.blur()">
          <span style="color:var(--text3);font-size:12px;margin-left:8px;">DPI</span>
          <input class="dpi-input" id="dpi-input" type="number" min="100" max="36000" step="100" value="800" onchange="updateDPI(this.value)" style="width:80px;">
          <span style="flex:1"></span>
          <button class="boot-btn" onclick="duplicateProfile(selectedProfileId)">Duplicate</button>
          <button class="boot-btn" onclick="exportProfile(selectedProfileId)">Export .dat</button>
          <button class="boot-btn" onclick="deleteProfile(selectedProfileId)" style="border-color:var(--red);color:var(--red-txt);">Delete</button>
        </div>

        <!-- Keybinds Card -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">Button assignments</div>
          </div>
          <div class="card-body">

            <!-- Mouse diagram: top view + side view with numbered overlays -->
            <div class="mouse-diagram" style="margin:0 auto 20px;">

              <!-- Top view -->
              <div>
                <div class="mouse-img-wrap">
                  <img src="/static/mouse-top.png" alt="Top view">
                  <div class="num" style="top:10.4%;left:40.5%">1</div>
                  <div class="num" style="top:12.4%;left:74.5%">2</div>
                  <div class="num" style="top:25.4%;left:55.2%">3</div>
                  <div class="num" style="top:14.1%;left:55.8%">4</div>
                  <div class="num" style="top:35.8%;left:54.8%">5</div>
                  <div class="num" style="top:25%;left:66.2%">6</div>
                  <div class="num" style="top:25.4%;left:44.7%">7</div>
                  <div class="num" style="top:17%;left:22.6%">8</div>
                  <div class="num" style="top:28.5%;left:18.6%">9</div>
                </div>
                <div class="diagram-label">Top view</div>
              </div>

              <!-- Side view -->
              <div>
                <div class="mouse-img-wrap">
                  <img src="/static/mouse-side.png" alt="Left side view">
                  <div class="num" style="top:37.4%;left:87.4%">10</div>
                  <div class="num" style="top:52.3%;left:91.3%">11</div>
                  <div class="num" style="top:39.2%;left:53.4%">12</div>
                  <div class="num" style="top:53.8%;left:56.4%">13</div>
                  <div class="num" style="top:52.4%;left:23.9%">14</div>
                </div>
                <div class="diagram-label">Left side</div>
              </div>

            </div>

            <!-- Keybind table -->
            <table class="keybind-table" id="keybind-table"></table>

          </div>
        </div>

      </div><!-- /editor-section -->

    </div><!-- /content -->

    <!-- Status bar -->
    <div class="statusbar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Ready</span>
      <span style="margin-left:auto;" id="status-boot">Boot 1</span>
    </div>

  </div><!-- /main -->
</div><!-- /shell -->

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let currentBoot      = 'boot1';
let storedProfiles   = [];     // full library from /api/stored
let activeSlots      = [];     // 5 slots from /api/slots/{boot}
let selectedProfileId = null;  // which stored profile is selected for editing
let selectedSlot      = null;  // which active slot is visually selected

// Button order matches diagram numbering
const BUTTON_ORDER = [
  'left_button', 'right_button', 'middle_button',
  'scroll_up', 'scroll_down', 'tilt_left', 'tilt_right',
  'dpi_up', 'dpi_down',
  'side_button_1', 'side_button_2',
  'thumb_button_1', 'thumb_button_2',
  'easy_shift',
];

const KEYBIND_LABELS = {
  left_button:    'Left button',
  right_button:   'Right button',
  middle_button:  'Middle click',
  scroll_up:      'Scroll up',
  scroll_down:    'Scroll down',
  tilt_left:      'Tilt left',
  tilt_right:     'Tilt right',
  side_button_1:  'Side button 1',
  side_button_2:  'Side button 2',
  thumb_button_1: 'Thumb 1 (3D Wing)',
  thumb_button_2: 'Thumb 2 (3D Wing)',
  dpi_up:         'DPI up',
  dpi_down:       'DPI down',
  easy_shift:     'Easy Shift',
};

const KEYBIND_OPTIONS = [
  'Left Click', 'Right Click', 'Middle Click',
  'Scroll Up', 'Scroll Down',
  'Tilt Left', 'Tilt Right',
  'Browser Back', 'Browser Forward',
  'DPI Up', 'DPI Down', 'DPI Cycle', 'DPI Cycle Up', 'DPI Cycle Down',
  'Page Up', 'Page Down', 'Delete', 'Insert', 'Home', 'End',
  'Easy Shift',
  'Copy', 'Paste', 'Cut', 'Undo', 'Redo',
  'Play/Pause', 'Next Track', 'Prev Track', 'Volume Up', 'Volume Down', 'Mute',
  'Snipping Tool', 'Task Manager', 'Show Desktop',
  'Macro 1', 'Macro 2', 'Macro 3',
  'Disabled',
];

// ── Helpers ────────────────────────────────────────────────────────────────
function getSelectedProfile() {
  if (!selectedProfileId) return null;
  return storedProfiles.find(p => p.id === selectedProfileId) || null;
}

// ── Boot switch ────────────────────────────────────────────────────────────
function switchBoot(bootId) {
  currentBoot = bootId;
  selectedSlot = null;
  document.getElementById('tab-boot1').className = 'boot-btn' + (bootId === 'boot1' ? ' active' : '');
  document.getElementById('tab-boot2').className = 'boot-btn' + (bootId === 'boot2' ? ' active' : '');
  document.getElementById('status-boot').textContent = bootId === 'boot1' ? 'Boot 1' : 'Boot 2';
  loadSlots();
}

// ── API calls ──────────────────────────────────────────────────────────────
async function apiFetch(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch('/api' + path, opts);
  if (method === 'DELETE' && res.ok) return {};
  return res.json();
}

async function loadStored() {
  const data = await apiFetch('GET', '/stored');
  storedProfiles = data.profiles || [];
  renderStoredList();
  // If selected profile no longer exists, deselect
  if (selectedProfileId && !storedProfiles.find(p => p.id === selectedProfileId)) {
    selectedProfileId = null;
    hideEditor();
  }
}

async function loadSlots() {
  const data = await apiFetch('GET', `/slots/${currentBoot}`);
  activeSlots = data.slots || [];
  renderActiveSlots();
}

async function loadAll() {
  setStatus('Loading...');
  await Promise.all([loadStored(), loadSlots()]);
  setStatus('Ready');
}

// ── Active Slots Rendering ─────────────────────────────────────────────────
function renderActiveSlots() {
  const container = document.getElementById('active-slots-sidebar');
  let html = '';
  for (let i = 1; i <= 5; i++) {
    const slotData = activeSlots.find(s => s.slot === i);
    const profile = slotData ? slotData.profile : null;
    const isActive = selectedProfileId && profile && profile.id === selectedProfileId;
    const cls = 'profile-item' + (isActive ? ' active' : '');

    html += `<div class="${cls}" data-slot="${i}"
      onclick="onSlotClick(${i})"
      ondragover="onSlotDragOver(event, this)"
      ondragleave="onSlotDragLeave(event, this)"
      ondrop="onSlotDrop(event, ${i}, this)">
      <span class="profile-slot-num">${i}</span>`;

    if (profile) {
      html += `<span class="profile-dot" style="background:${profile.color || '#888'}"></span>
        <span class="profile-item-name">${escapeHtml(profile.name)}</span>
        <button class="slot-clear-btn" onclick="event.stopPropagation();clearSlot(${i})" title="Unassign" style="margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;">&times;</button>`;
    } else {
      html += `<span class="profile-dot" style="background:var(--bg4)"></span>
        <span class="profile-item-name" style="color:var(--text3)">Empty</span>`;
    }

    html += `</div>`;
  }
  container.innerHTML = html;
}

function onSlotClick(slotNum) {
  const slotData = activeSlots.find(s => s.slot === slotNum);
  if (slotData && slotData.profile) {
    selectedSlot = slotNum;
    // Find the stored profile by id and select it for editing
    const profileId = slotData.profile.id;
    if (profileId && storedProfiles.find(p => p.id === profileId)) {
      selectStoredProfile(profileId);
    }
    renderActiveSlots();
  }
}

async function clearSlot(slotNum) {
  setStatus('Clearing slot...');
  await apiFetch('PUT', `/slots/${currentBoot}/${slotNum}`, { profile_id: null });
  await loadSlots();
  setStatus('Ready');
  toast('Slot cleared', 'success');
}

// ── Drag and Drop ──────────────────────────────────────────────────────────
function onSlotDragOver(e, el) {
  e.preventDefault();
  el.classList.add('drag-over');
}

function onSlotDragLeave(e, el) {
  el.classList.remove('drag-over');
}

async function onSlotDrop(e, slotNum, el) {
  e.preventDefault();
  el.classList.remove('drag-over');
  const profileId = e.dataTransfer.getData('text/plain');
  if (!profileId) return;
  setStatus('Assigning to slot...');
  await apiFetch('PUT', `/slots/${currentBoot}/${slotNum}`, { profile_id: profileId });
  await loadSlots();
  setStatus('Ready');
  toast('Profile assigned to slot ' + slotNum, 'success');
}

function onStoredDragStart(e, profileId) {
  e.dataTransfer.setData('text/plain', profileId);
  e.dataTransfer.effectAllowed = 'copy';
}

// ── Stored Profiles List ───────────────────────────────────────────────────
function renderStoredList() {
  const list = document.getElementById('stored-list-sidebar');
  let html = storedProfiles.map(p => {
    const isActive = p.id === selectedProfileId;
    return `<div class="profile-item ${isActive ? 'active' : ''}" draggable="true" data-profile-id="${p.id}"
      onclick="selectStoredProfile('${p.id}')"
      ondragstart="onStoredDragStart(event, '${p.id}')">
      <span class="profile-dot" style="background:${p.color || '#888'}"></span>
      <span class="profile-item-name">${escapeHtml(p.name)}</span>
    </div>`;
  }).join('');
  html += `<div style="padding:4px 8px;">
    <button onclick="createNewProfile()" style="width:100%;padding:5px;border-radius:6px;border:1px dashed var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;">+ New Profile</button>
  </div>`;
  list.innerHTML = html;
}

function selectStoredProfile(profileId) {
  selectedProfileId = profileId;
  renderStoredList();
  renderEditor();
}

// ── Profile Editor ─────────────────────────────────────────────────────────
function renderEditor() {
  const profile = getSelectedProfile();
  const section = document.getElementById('editor-section');
  if (!profile) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';
  document.getElementById('profile-name-input').value = profile.name;
  document.getElementById('color-swatch').style.background = profile.color || '#888';
  renderDPI();
  renderKeybinds();
}

function hideEditor() {
  document.getElementById('editor-section').style.display = 'none';
}

async function saveProfileName() {
  const profile = getSelectedProfile();
  if (!profile) return;
  const name = document.getElementById('profile-name-input').value.trim();
  if (!name || name === profile.name) return;
  profile.name = name;
  await apiFetch('PUT', `/stored/${profile.id}`, profile);
  renderStoredList();
  await loadSlots();
  toast('Profile renamed', 'success');
}

// ── DPI ────────────────────────────────────────────────────────────────────
function renderDPI() {
  const profile = getSelectedProfile();
  if (!profile) return;
  document.getElementById('dpi-input').value = profile.dpi;
}

function updateDPI(val) {
  const profile = getSelectedProfile();
  if (!profile) return;
  const parsed = Math.max(100, Math.min(36000, parseInt(val) || 800));
  profile.dpi = parsed;
  document.getElementById('dpi-input').value = parsed;
  autosave();
}

// ── Keybinds ───────────────────────────────────────────────────────────────
function buildKeybindCell(value, key, layer) {
  const isHotkey = value && value.startsWith('Hotkey ');
  const changeFn = layer === 'primary' ? 'updateKeybind' : 'updateEasyShift';
  const recId = `rec-${layer}-${key}`;

  if (isHotkey) {
    const hotkeyName = value.substring(7);
    return `<div class="keybind-cell">
      <div class="hotkey-display">
        <span>${escapeHtml(hotkeyName)}</span>
        <span class="hotkey-clear" onclick="${changeFn}('${key}','Disabled');renderKeybinds()">&times;</span>
      </div>
      <button class="rec-btn" title="Record hotkey" onclick="startRecording('${key}','${layer}')">&#9000;</button>
    </div>`;
  }

  const opts = KEYBIND_OPTIONS.map(o =>
    `<option value="${o}" ${o === value ? 'selected' : ''}>${o}</option>`
  ).join('');

  return `<div class="keybind-cell">
    <select class="keybind-select" id="${recId}" onchange="onKeybindChange('${key}','${layer}',this.value)">
      <option value="__hotkey__">Hotkey...</option>
      ${opts}
    </select>
    <button class="rec-btn" title="Record hotkey" onclick="startRecording('${key}','${layer}')">&#9000;</button>
  </div>`;
}

function renderKeybinds() {
  const profile = getSelectedProfile();
  if (!profile) return;

  const table = document.getElementById('keybind-table');
  const easyShift = profile.easy_shift || {};

  const header = `<thead><tr>
    <th style="width:28px">#</th><th>Button</th><th>Primary</th><th>Easy Shift</th>
  </tr></thead>`;

  const rows = BUTTON_ORDER.map((key, idx) => {
    const action = profile.keybinds[key] || 'Disabled';
    const label = KEYBIND_LABELS[key] || key;
    const num = idx + 1;

    const primaryCell = buildKeybindCell(action, key, 'primary');

    let esCell = '';
    if (key !== 'easy_shift') {
      const esAction = easyShift[key] || 'Disabled';
      esCell = buildKeybindCell(esAction, key, 'easyshift');
    } else {
      esCell = `<span style="font-size:11px;color:var(--text3)">&mdash;</span>`;
    }

    return `<tr id="row-${key}">
      <td><div class="diagram-num">${num}</div></td>
      <td>${label}</td>
      <td>${primaryCell}</td>
      <td>${esCell}</td>
    </tr>`;
  }).join('');

  table.innerHTML = header + '<tbody>' + rows + '</tbody>';
}

function onKeybindChange(key, layer, value) {
  if (value === '__hotkey__') {
    startRecording(key, layer);
    return;
  }
  const profile = getSelectedProfile();
  if (!profile) return;
  if (layer === 'primary') {
    profile.keybinds[key] = value;
  } else {
    if (!profile.easy_shift) profile.easy_shift = {};
    profile.easy_shift[key] = value;
  }
  autosave();
}

function updateKeybind(key, value) {
  const profile = getSelectedProfile();
  if (!profile) return;
  profile.keybinds[key] = value;
  autosave();
}

function updateEasyShift(key, value) {
  const profile = getSelectedProfile();
  if (!profile) return;
  if (!profile.easy_shift) profile.easy_shift = {};
  profile.easy_shift[key] = value;
  autosave();
}

// ── Hotkey recording ────────────────────────────────────────────────────
let recordingKey = null;
let recordingLayer = null;
let recordingListener = null;

function startRecording(key, layer) {
  // Cancel any existing recording
  stopRecordingCancel();

  recordingKey = key;
  recordingLayer = layer;

  // Replace the cell content with recording prompt
  const recId = `rec-${layer}-${key}`;
  const cell = document.getElementById(recId);
  if (cell) {
    cell.parentElement.innerHTML = `<div class="keybind-cell">
      <div class="recording">Press a key...</div>
    </div>`;
  }

  recordingListener = function(e) {
    e.preventDefault();
    e.stopPropagation();

    // Ignore standalone modifier keypresses — wait for actual key
    if (['Control','Shift','Alt','Meta'].includes(e.key)) return;

    // Escape cancels
    if (e.key === 'Escape') {
      stopRecordingCancel();
      return;
    }

    // Build hotkey string
    const parts = [];
    if (e.ctrlKey) parts.push('Ctrl');
    if (e.shiftKey) parts.push('Shift');
    if (e.altKey) parts.push('Alt');
    if (e.metaKey) parts.push('Win');

    // Map key name
    let keyName = e.key;
    if (keyName.length === 1) {
      keyName = keyName.toUpperCase();
    } else {
      // Clean up key names
      const keyMap = {
        'ArrowUp':'Up','ArrowDown':'Down','ArrowLeft':'Left','ArrowRight':'Right',
        'Backspace':'Backspace','Tab':'Tab','Enter':'Enter','Escape':'Esc',
        'Delete':'Del','Insert':'Insert','Home':'Home','End':'End',
        'PageUp':'PageUp','PageDown':'PageDown','CapsLock':'CapsLock',
        'F1':'F1','F2':'F2','F3':'F3','F4':'F4','F5':'F5','F6':'F6',
        'F7':'F7','F8':'F8','F9':'F9','F10':'F10','F11':'F11','F12':'F12',
        ' ':'Space',
      };
      keyName = keyMap[keyName] || keyName;
    }

    parts.push(keyName);
    const hotkeyStr = 'Hotkey ' + parts.join('+');

    // Save it
    const profile = getSelectedProfile();
    if (profile) {
      if (recordingLayer === 'primary') {
        profile.keybinds[recordingKey] = hotkeyStr;
      } else {
        if (!profile.easy_shift) profile.easy_shift = {};
        profile.easy_shift[recordingKey] = hotkeyStr;
      }
      autosave();
    }

    // Clean up and re-render
    document.removeEventListener('keydown', recordingListener, true);
    recordingKey = null;
    recordingLayer = null;
    recordingListener = null;
    renderKeybinds();
    toast('Recorded: ' + parts.join('+'), 'success');
  };

  document.addEventListener('keydown', recordingListener, true);
}

function stopRecordingCancel() {
  if (recordingListener) {
    document.removeEventListener('keydown', recordingListener, true);
    recordingKey = null;
    recordingLayer = null;
    recordingListener = null;
    renderKeybinds();
  }
}

// ── Autosave ───────────────────────────────────────────────────────────────
let saveTimer = null;
function autosave() {
  const profile = getSelectedProfile();
  if (!profile) return;
  setStatus('Unsaved changes...');
  clearTimeout(saveTimer);
  const profileId = profile.id;
  saveTimer = setTimeout(async () => {
    await apiFetch('PUT', `/stored/${profileId}`, {
      name:         profile.name,
      color:        profile.color,
      dpi:          profile.dpi,
      keybinds:     profile.keybinds,
      easy_shift:   profile.easy_shift || {},
    });
    setStatus('Saved');
    // Refresh slots in case edited profile is in an active slot
    await loadSlots();
    setTimeout(() => setStatus('Ready'), 2000);
  }, 800);
}

// ── Profile CRUD ───────────────────────────────────────────────────────────
async function createNewProfile() {
  setStatus('Creating profile...');
  const result = await apiFetch('POST', '/stored', {
    name: 'New Profile',
    color: '#7c6af5',
    dpi: 800,
    keybinds: {
      left_button: 'Left Click', right_button: 'Right Click',
      middle_button: 'Middle Click', scroll_up: 'Scroll Up',
      scroll_down: 'Scroll Down', tilt_left: 'Disabled',
      tilt_right: 'Disabled', side_button_1: 'Browser Back',
      side_button_2: 'Browser Forward', thumb_button_1: 'Disabled',
      thumb_button_2: 'Disabled', dpi_up: 'DPI Up',
      dpi_down: 'DPI Down', easy_shift: 'Easy Shift',
    },
    easy_shift: {
      left_button: 'Disabled', right_button: 'Disabled',
      middle_button: 'Disabled', scroll_up: 'Disabled',
      scroll_down: 'Disabled', tilt_left: 'Disabled',
      tilt_right: 'Disabled', side_button_1: 'Disabled',
      side_button_2: 'Disabled', thumb_button_1: 'Disabled',
      thumb_button_2: 'Disabled', dpi_up: 'Disabled',
      dpi_down: 'Disabled',
    },
  });
  await loadStored();
  if (result && result.id) {
    selectStoredProfile(result.id);
  }
  setStatus('Ready');
  toast('Profile created', 'success');
}

async function duplicateProfile(profileId) {
  setStatus('Duplicating...');
  const result = await apiFetch('POST', `/stored/${profileId}/duplicate`);
  await loadStored();
  if (result && result.id) {
    selectStoredProfile(result.id);
  }
  setStatus('Ready');
  toast('Profile duplicated', 'success');
}

async function deleteProfile(profileId) {
  const profile = storedProfiles.find(p => p.id === profileId);
  if (!profile) return;
  if (!confirm(`Delete "${profile.name}"?`)) return;
  setStatus('Deleting...');
  await apiFetch('DELETE', `/stored/${profileId}`);
  if (selectedProfileId === profileId) {
    selectedProfileId = null;
    hideEditor();
  }
  await Promise.all([loadStored(), loadSlots()]);
  setStatus('Ready');
  toast('Profile deleted', 'success');
}

function exportProfile(profileId) {
  window.location.href = `/api/export/${profileId}`;
}

function exportAll() {
  window.location.href = `/api/export-all/${currentBoot}`;
}

async function importToMouse() {
  if (!confirm('This will write all 5 active slot profiles to the mouse and restart SWARM II. Continue?')) return;
  setStatus('Writing profiles to mouse...');
  toast('Importing to mouse...');
  try {
    const res = await fetch(`/api/import-to-mouse/${currentBoot}`, { method: 'POST' });
    const data = await res.json();
    if (data.success) {
      toast(data.message || 'Imported to mouse!', 'success');
      setStatus('Imported to mouse');
    } else {
      toast(data.error || 'Import failed', 'error');
      setStatus('Import failed');
    }
  } catch (e) {
    toast('Import failed: ' + e.message, 'error');
    setStatus('Import failed');
  }
}

// ── Status ─────────────────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status-text').textContent = msg;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (msg.includes('Error') || msg.includes('failed') ? ' warn' : '');
}

// ── Toast ──────────────────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2500);
}

// ── Utility ────────────────────────────────────────────────────────────────
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Init ───────────────────────────────────────────────────────────────────
loadAll();
</script>
